<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix Studio - Atae KHATBANE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Neue+Montreal:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
  <script type="module" crossorigin src="/assets/mix-Deb3bENv.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/three.module-BnXt3lE0.js">
  <link rel="stylesheet" crossorigin href="/assets/mix-C_nTWk8a.css">
</head>

<body>
    <!-- 3D Trippy Lines Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Film Grain Overlay -->
    <div class="noise"></div>

    <div class="mix-container">
        <a href="./index.html" class="mix-close" title="Return to CV">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                <path d="M18 6L6 18M6 6l12 12" />
            </svg>
        </a>

        <!-- Top Row: Transport & Visualizer -->
        <div class="deck-top">
            <!-- Presets Bank -->
            <div class="presets glass-panel">
                <h3>PRESETS</h3>
                <div class="preset-buttons">
                    <button class="preset-btn active" data-preset="flat">FLAT</button>
                    <button class="preset-btn" data-preset="club">CLUB EXT.</button>
                    <button class="preset-btn" data-preset="lofi">VINTAGE</button>
                    <button class="preset-btn" data-preset="bass">SUB BOOST</button>
                </div>
            </div>

            <!-- Transport Controls -->
            <div class="transport glass-panel">
                <button id="play-pause-btn" class="transport-btn">
                    <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"
                        style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <div class="seek-bar-container" id="seek-bar-container">
                    <div class="seek-bar-track" id="seek-bar-track">
                        <div class="seek-bar-fill" id="seek-bar-fill"></div>
                    </div>
                    <div class="seek-time">
                        <span id="seek-current">0:00</span>
                        <span id="seek-total">0:00</span>
                    </div>
                </div>
            </div>

            <!-- Live Visualizers -->
            <div class="visualizer glass-panel">
                <canvas id="spectrum-canvas"></canvas>
                <canvas id="oscilloscope-canvas"></canvas>
            </div>
        </div>

        <!-- UI Grid -->
        <div class="mix-grid">
            <!-- EQ Section -->
            <div class="mix-section glass-panel">
                <h3>EQUALIZER</h3>
                <div class="knob-row eq-row">
                    <div class="control-group">
                        <div class="knob-container" id="eq-low" data-min="-20" data-max="20" data-val="0"
                            data-label="Low" data-suffix=" dB" data-sub="320 Hz"></div>
                    </div>
                    <div class="control-group">
                        <div class="knob-container" id="eq-mid" data-min="-20" data-max="20" data-val="0"
                            data-label="Mid" data-suffix=" dB" data-sub="1 kHz"></div>
                    </div>
                    <div class="control-group">
                        <div class="knob-container" id="eq-high" data-min="-20" data-max="20" data-val="0"
                            data-label="High" data-suffix=" dB" data-sub="3.2 kHz"></div>
                    </div>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="mix-section glass-panel">
                <h3>FILTERS</h3>
                <div class="knob-row">
                    <div class="control-group">
                        <div class="knob-container" id="filter-hp" data-min="20" data-max="20000" data-val="20"
                            data-label="High Pass" data-suffix=" Hz" data-log="true"></div>
                    </div>
                    <div class="control-group">
                        <div class="knob-container" id="filter-lp" data-min="20" data-max="20000" data-val="20000"
                            data-label="Low Pass" data-suffix=" Hz" data-log="true"></div>
                    </div>
                </div>
            </div>

            <!-- Effects Section -->
            <div class="mix-section glass-panel">
                <h3>FX RACK</h3>
                <div class="knob-row">
                    <div class="control-group">
                        <div class="knob-container" id="fx-dist" data-min="0" data-max="20" data-val="0"
                            data-label="Drive" data-suffix="%"></div>
                    </div>
                    <div class="control-group">
                        <div class="knob-container" id="fx-reverb" data-min="0" data-max="1" data-val="0"
                            data-label="Reverb" data-suffix=""></div>
                    </div>
                </div>
            </div>

            <!-- Stereo Width Section -->
            <div class="mix-section glass-panel">
                <h3>STEREO</h3>
                <div class="knob-row">
                    <div class="control-group">
                        <div class="knob-container" id="stereo-width" data-min="0" data-max="2" data-val="1"
                            data-label="Width" data-suffix=""></div>
                    </div>
                    <div class="control-group">
                        <div class="knob-container" id="stereo-pan" data-min="-1" data-max="1" data-val="0"
                            data-label="Pan" data-suffix=""></div>
                    </div>
                </div>
                <div class="stereo-mono-row">
                    <label class="toggle-label">
                        <span>MONO</span>
                        <input type="checkbox" id="stereo-mono">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- Compressor + Master Output — unified panel -->
            <div class="mix-section master-unified glass-panel">
                <!-- Left Half: Compressor -->
                <div class="unified-half">
                    <h3>COMPRESSOR</h3>
                    <div class="master-layout">
                        <div class="knob-row">
                            <div class="control-group">
                                <div class="knob-container" id="comp-thresh" data-min="-60" data-max="0" data-val="-24"
                                    data-label="Thresh" data-suffix=" dB"></div>
                            </div>
                            <div class="control-group">
                                <div class="knob-container" id="comp-ratio" data-min="1" data-max="20" data-val="4"
                                    data-label="Ratio" data-suffix=":1"></div>
                            </div>
                        </div>
                        <!-- Gain Reduction Meter -->
                        <div class="meter-container gr-meter">
                            <div class="meter-track">
                                <div class="meter-fill" id="gr-meter"></div>
                            </div>
                            <div class="meter-labels">
                                <span>0</span>
                                <span>3</span>
                                <span>6</span>
                            </div>
                            <span class="gr-label align-center">GR</span>
                        </div>
                    </div>
                </div>

                <!-- Divider -->
                <div class="panel-divider"></div>

                <!-- Right Half: Master Output -->
                <div class="unified-half">
                    <h3>MASTER OUTPUT</h3>
                    <div class="master-layout">
                        <div class="knob-row">
                            <div class="control-group">
                                <div class="knob-container large-knob" id="master-vol" data-min="0" data-max="1"
                                    data-val="0.5" data-label="Gain" data-suffix=""></div>
                            </div>
                            <div class="control-group">
                                <div class="knob-container" id="master-blend" data-min="0" data-max="1" data-val="1"
                                    data-label="Dry/Wet" data-suffix=""></div>
                            </div>
                            <!-- Varispeed Slider -->
                            <div class="control-group varispeed-group">
                                <div class="varispeed-slider">
                                    <input type="range" id="tape-speed" min="0.5" max="1.5" step="0.01" value="1.0"
                                        orient="vertical">
                                </div>
                                <span class="knob-label">TAPE SPD</span>
                                <span class="knob-sub" id="tape-speed-val">1.00x</span>
                            </div>
                        </div>

                        <!-- Master Peak Meter -->
                        <div class="meter-container">
                            <div class="meter-track">
                                <div class="meter-fill" id="peak-meter"></div>
                            </div>
                            <div class="meter-labels">
                                <span>0</span>
                                <span>-6</span>
                                <span>-12</span>
                                <span>-24</span>
                            </div>
                            <span class="gr-label align-center">OUT</span>
                        </div>

                        <div class="master-toggles">
                            <label class="toggle-label">
                                <span>Limiter</span>
                                <input type="checkbox" id="master-limiter" checked>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <audio id="mix-audio" src="/assets/groovy%20deep%20house%20mix%20session-CoNu0gV7.mp3"></audio>
</body>

</html>
